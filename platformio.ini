; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:cardputer_adv]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
board_upload.flash_size = 8MB

monitor_speed = 115200
upload_speed = 1500000
build_type = debug

[env:cardputer_adv_ota]
extends = env:cardputer_adv
board_build.partitions = partitions_ota_8mb.csv
board_build.app_partition_name = ota_0
extra_scripts = post:scripts/ota_upload_offset.py

[env:cardputer_adv_wifi_dev]
extends = env:cardputer_adv_ota
build_flags =
  -DPOCKETSYNTH_ENABLE_WIFI_DEV_MODE=1
  -DPOCKETSYNTH_FORCE_DEV_MODE=1
  -DPOCKETSYNTH_ENABLE_USB_MIDI_HOST=1
  -DPOCKETSYNTH_ENABLE_M32_OLED=1
  -DPOCKETSYNTH_INVERT_SUSTAIN_PEDAL=1
